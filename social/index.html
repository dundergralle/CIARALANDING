<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Ciara</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }

  /* === BACKGROUND === Animerad pastellgradient med svävande blobs */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(135deg, #ffffff 0%, #ffd4ec 30%, #ff6fb5 60%, #b14fdb 100%);
    background-size: 300% 300%;
    animation: gradientShift 18s ease infinite;
    overflow: hidden;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* Svävande blobs */
  .bg::before,
  .bg::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.65;
    will-change: transform;
  }

  .bg::before {
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, #ff3d9a, #ff6fb5);
    top: -80px;
    left: -60px;
    animation: floatA 14s ease-in-out infinite;
  }

  .bg::after {
    width: 380px;
    height: 380px;
    background: radial-gradient(circle, #b14fdb, #d896ff);
    bottom: -100px;
    right: -80px;
    animation: floatB 17s ease-in-out infinite;
  }

  /* Tredje blob */
  .blob {
    position: fixed;
    z-index: 0;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffffff, #ffd4ec);
    filter: blur(55px);
    opacity: 0.6;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: floatC 20s ease-in-out infinite;
  }

  @keyframes floatA {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(60px, 80px) scale(1.15); }
  }

  @keyframes floatB {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-70px, -50px) scale(1.1); }
  }

  @keyframes floatC {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    33% { transform: translate(-30%, -60%) scale(1.2); }
    66% { transform: translate(-70%, -40%) scale(0.9); }
  }

  /* Glittriga små partiklar */
  .sparkle {
    position: fixed;
    z-index: 2;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 12px rgba(255,255,255,0.5);
    pointer-events: none;
    opacity: 0;
    animation: sparkleFloat 8s linear infinite;
  }

  .sparkle:nth-child(1)  { left: 5%;  animation-delay: 0s;   animation-duration: 9s;  width: 5px; height: 5px; }
  .sparkle:nth-child(2)  { left: 12%; animation-delay: 2.3s; animation-duration: 11s; width: 3px; height: 3px; }
  .sparkle:nth-child(3)  { left: 18%; animation-delay: 5.1s; animation-duration: 8s;  width: 6px; height: 6px; }
  .sparkle:nth-child(4)  { left: 24%; animation-delay: 1.4s; animation-duration: 10s; width: 4px; height: 4px; }
  .sparkle:nth-child(5)  { left: 30%; animation-delay: 6.2s; animation-duration: 7s;  width: 5px; height: 5px; }
  .sparkle:nth-child(6)  { left: 36%; animation-delay: 3.8s; animation-duration: 12s; width: 3px; height: 3px; }
  .sparkle:nth-child(7)  { left: 42%; animation-delay: 0.7s; animation-duration: 9s;  width: 7px; height: 7px; }
  .sparkle:nth-child(8)  { left: 48%; animation-delay: 4.5s; animation-duration: 8s;  width: 4px; height: 4px; }
  .sparkle:nth-child(9)  { left: 54%; animation-delay: 7.1s; animation-duration: 11s; width: 5px; height: 5px; }
  .sparkle:nth-child(10) { left: 60%; animation-delay: 2.9s; animation-duration: 10s; width: 3px; height: 3px; }
  .sparkle:nth-child(11) { left: 66%; animation-delay: 5.6s; animation-duration: 7s;  width: 6px; height: 6px; }
  .sparkle:nth-child(12) { left: 72%; animation-delay: 1.1s; animation-duration: 9s;  width: 4px; height: 4px; }
  .sparkle:nth-child(13) { left: 78%; animation-delay: 4.2s; animation-duration: 12s; width: 5px; height: 5px; }
  .sparkle:nth-child(14) { left: 84%; animation-delay: 6.8s; animation-duration: 8s;  width: 3px; height: 3px; }
  .sparkle:nth-child(15) { left: 90%; animation-delay: 3.3s; animation-duration: 10s; width: 6px; height: 6px; }
  .sparkle:nth-child(16) { left: 95%; animation-delay: 0.4s; animation-duration: 9s;  width: 4px; height: 4px; }
  .sparkle:nth-child(17) { left: 8%;  animation-delay: 7.5s; animation-duration: 11s; width: 5px; height: 5px; }
  .sparkle:nth-child(18) { left: 28%; animation-delay: 4.0s; animation-duration: 8s;  width: 3px; height: 3px; }
  .sparkle:nth-child(19) { left: 45%; animation-delay: 6.0s; animation-duration: 10s; width: 5px; height: 5px; }
  .sparkle:nth-child(20) { left: 58%; animation-delay: 1.8s; animation-duration: 9s;  width: 4px; height: 4px; }
  .sparkle:nth-child(21) { left: 75%; animation-delay: 5.4s; animation-duration: 11s; width: 6px; height: 6px; }
  .sparkle:nth-child(22) { left: 88%; animation-delay: 2.6s; animation-duration: 8s;  width: 3px; height: 3px; }
  .sparkle:nth-child(23) { left: 15%; animation-delay: 8.0s; animation-duration: 10s; width: 4px; height: 4px; }
  .sparkle:nth-child(24) { left: 65%; animation-delay: 3.5s; animation-duration: 12s; width: 5px; height: 5px; }

  @keyframes sparkleFloat {
    0% { transform: translateY(110vh) scale(0); opacity: 0; }
    10% { opacity: 1; transform: translateY(90vh) scale(1); }
    50% { opacity: 1; transform: translateY(50vh) scale(1.1); }
    90% { opacity: 0.8; }
    100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
  }

  /* Lätt overlay för läsbarhet */
  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
    z-index: 1;
    pointer-events: none;
  }

  @media (prefers-reduced-motion: reduce) {
    .bg, .bg::before, .bg::after, .blob, .sparkle { animation: none; }
  }

  body {
    min-height: 100%;
    min-height: 100dvh;
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    text-size-adjust: 100%;
    -webkit-text-size-adjust: 100%;
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem 1.5rem;
    padding-top: max(2rem, env(safe-area-inset-top));
    padding-bottom: max(2rem, env(safe-area-inset-bottom));
    padding-left: max(1.5rem, env(safe-area-inset-left));
    padding-right: max(1.5rem, env(safe-area-inset-right));
  }

  /* === AVATAR === matchar knapparnas gradient-ram */
  .avatar-wrap {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    padding: 4px;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, #ffffff 0%, #ff6fb5 50%, #b14fdb 100%);
    filter: drop-shadow(0 4px 14px rgba(255, 61, 154, 0.4));
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    background: #f0f0f0;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.6) inset;
  }

  /* === HEADINGS === */
  h1 {
    font-family: 'Bagel Fat One', cursive;
    font-size: 2.4rem;
    font-weight: 400;
    color: #ffffff;
    margin-bottom: 0.35rem;
    letter-spacing: 0.02em;
    text-shadow:
      0 0 20px rgba(255, 61, 154, 0.6),
      0 0 40px rgba(177, 79, 219, 0.4),
      0 2px 0 rgba(0,0,0,0.1);
  }

  .tagline {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.85);
    margin-bottom: 0.75rem;
    text-align: center;
    line-height: 1.4;
  }

  /* === LOCATION === bara text + skugga, ingen pill */
  .location-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 0;
    font-size: 0.72rem;
    font-weight: 500;
    color: #ffffff;
    margin-top: 0.75rem;
    margin-bottom: 0.5rem;
    min-height: 28px;
    text-shadow:
      0 1px 3px rgba(0,0,0,0.45),
      0 0 12px rgba(0,0,0,0.35);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* === BUTTONS — chunky chrome-cyber style === */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    width: 100%;
    max-width: 320px;
  }

  .btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 58px;
    padding: 0 1.5rem;
    /* unik form: snedklippta hörn (squircle/cyber-tagg) */
    clip-path: polygon(
      14px 0,
      calc(100% - 14px) 0,
      100% 14px,
      100% calc(100% - 14px),
      calc(100% - 14px) 100%,
      14px 100%,
      0 calc(100% - 14px),
      0 14px
    );
    background:
      linear-gradient(135deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.28) 100%);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    color: #ffffff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    text-decoration: none;
    border: none;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), filter 0.2s;
    text-shadow: 0 0 12px rgba(255,255,255,0.6), 0 1px 2px rgba(177, 79, 219, 0.5);
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.6) inset,
      0 0 22px rgba(255, 61, 154, 0.45),
      0 6px 24px rgba(177, 79, 219, 0.35);
  }

  /* Yttre "tagg-ram" runt knappen (dubbel border-illusion) */
  .btn-wrap {
    position: relative;
    padding: 4px;
    clip-path: polygon(
      18px 0,
      calc(100% - 18px) 0,
      100% 18px,
      100% calc(100% - 18px),
      calc(100% - 18px) 100%,
      18px 100%,
      0 calc(100% - 18px),
      0 18px
    );
    background: linear-gradient(135deg, #ffffff 0%, #ff6fb5 50%, #b14fdb 100%);
    transition: filter 0.2s, transform 0.18s cubic-bezier(.34,1.56,.64,1);
    filter: drop-shadow(0 4px 14px rgba(255, 61, 154, 0.4));
  }

  .btn:active { transform: scale(0.96); }
  .btn-wrap:active { transform: scale(0.97); }

  @media (hover: hover) {
    .btn-wrap:hover {
      filter: drop-shadow(0 6px 20px rgba(255, 61, 154, 0.7)) brightness(1.08);
    }
    .btn-wrap:hover .btn {
      filter: brightness(1.1);
    }
  }
</style>
</head>

<script>
// Geolocation: shows "5 minutes ago in: [city]" based on visitor's IP
(function() {
  var fallbacks = [
    "Stockholm","Göteborg","Malmö","Uppsala","Linköping","Örebro","Västerås",
    "Helsingborg","Norrköping","Jönköping","Umeå","Lund","Gävle","Borås","Sundsvall",
    "Oslo","Bergen","Trondheim","Stavanger","Drammen","Kristiansand","Tromsø","Ålesund"
  ];
  function setCity(city) {
    var c = (city && city.trim().length > 1) ? city.trim() : fallbacks[Math.floor(Math.random() * fallbacks.length)];
    document.getElementById('loc-text').textContent = '5 minutes ago in: ' + c;
  }
  function get(url, extract) {
    return fetch(url, { cache: 'no-store' }).then(function(r) { return r.json(); }).then(function(d) {
      var v = extract(d);
      if (!v || v.trim().length < 2) throw new Error('no city');
      return v;
    });
  }
  get('https://ipinfo.io/json', function(d) { return d && d.city; })
    .catch(function() { return get('https://ip-api.com/json/?fields=city,regionName', function(d) { return d && (d.city || d.regionName); }); })
    .catch(function() { return get('https://ipapi.co/json/', function(d) { return d && (d.city || d.region); }); })
    .then(function(city) { setCity(city); })
    .catch(function() { setCity(null); });
})();
</script>
