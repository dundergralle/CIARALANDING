<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }

  @keyframes slideDown {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-50%); }
  }

  .bg-track {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-strip {
    display: flex;
    flex-direction: column;
    width: 100%;
    animation: slideDown 28s linear infinite;
  }

  .bg-strip img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    object-position: center top;
    display: block;
    flex-shrink: 0;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.25) 0%,
      rgba(0,0,0,0.45) 50%,
      rgba(0,0,0,0.25) 100%
    );
    z-index: 1;
  }

  body {
    min-height: 100%;
    min-height: 100dvh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    padding-top: max(2rem, env(safe-area-inset-top));
    padding-bottom: max(2rem, env(safe-area-inset-bottom));
    padding-left: max(1.5rem, env(safe-area-inset-left));
    padding-right: max(1.5rem, env(safe-area-inset-right));
    text-size-adjust: 100%;
    -webkit-text-size-adjust: 100%;
    position: relative;
    z-index: 2;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 1rem;
    border: 2.5px solid rgba(255,255,255,0.8);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 0.35rem;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .tagline {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.85);
    margin-bottom: 0.75rem;
    text-align: center;
    line-height: 1.4;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .location-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.95);
    margin-bottom: 1.75rem;
    min-height: 32px;
    border: 1px solid rgba(255,255,255,0.25);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    width: 100%;
    max-width: 340px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 52px;
    padding: 0 1rem;
    border-radius: 50px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #fff;
    font-size: 1rem;
    font-weight: 500;
    text-align: center;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.15s, border-color 0.15s;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  .btn:active { background: rgba(255,255,255,0.28); }
  @media (hover: hover) { .btn:hover { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.5); } }
</style>

// Geolocation fallback
(function() {
  var fallbacks = [
    "Stockholm","Göteborg","Malmö","Uppsala","Linköping","Örebro","Västerås",
    "Helsingborg","Norrköping","Jönköping","Umeå","Lund","Gävle","Borås","Sundsvall",
    "Oslo","Bergen","Trondheim","Stavanger","Drammen","Kristiansand","Tromsø","Ålesund",
    "København","Aarhus","Odense","Aalborg","Esbjerg","Randers","Kolding","Vejle",
    "Helsinki","Espoo","Tampere","Vantaa","Oulu","Turku","Jyväskylä","Lahti"
  ];
  function setCity(city) {
    var c = (city && city.trim().length > 1) ? city.trim() : fallbacks[Math.floor(Math.random() * fallbacks.length)];
    document.getElementById('loc-text').textContent = '5 minutes ago in: ' + c;
  }
  function get(url, extract) {
    return fetch(url, { cache: 'no-store' }).then(function(r) { return r.json(); }).then(function(d) {
      var v = extract(d);
      if (!v || v.trim().length < 2) throw new Error('no city');
      return v;
    });
  }
  get('https://ipinfo.io/json', function(d) { return d && d.city; })
    .catch(function() { return get('https://ip-api.com/json/?fields=city,regionName', function(d) { return d && (d.city || d.regionName); }); })
    .catch(function() { return get('https://ipapi.co/json/', function(d) { return d && (d.city || d.region); }); })
    .then(function(city) { setCity(city); })
    .catch(function() { setCity(null); });
})();
